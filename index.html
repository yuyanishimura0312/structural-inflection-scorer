<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structural Inflection Point Scorer</title>
<link rel="icon" href="https://esse-sense.com/favicon.ico">
<style>
/* ===== Miratuku CI Design System ===== */
:root {
  /* Primary Brand */
  --primary: #783c28;
  --primary-hover: #5c2e1e;
  --primary-light: #f5e8e0;
  --primary-ring: rgba(120, 60, 40, 0.2);
  /* Accent */
  --accent: #A86B50;
  --accent-hover: #8B5840;
  --accent-light: #e8c4bb;
  /* Backgrounds */
  --bg: #fdfaf7;
  --bg-secondary: #f3efe9;
  --bg-warm: #ede6dc;
  --card: #ffffff;
  /* Text */
  --text: #3d2e22;
  --text-secondary: #5c4a3e;
  --text-muted: #8a7668;
  --text-placeholder: #b3a396;
  /* Borders */
  --border: #e6d5c4;
  --border-dark: #d4bfad;
  --border-light: #f0ece6;
  /* Semantic */
  --success: #5a7a52;
  --warning: #b8863e;
  --danger: #b44a3f;
  --info: #2c5f8a;
  --gold: #C9A96E;
  /* Spacing & Radius */
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  /* Shadows (Stripe-inspired) */
  --shadow-sm: 0 0 0 1px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 0 0 1px rgba(0,0,0,0.04), 0 4px 8px rgba(0,0,0,0.06), 0 12px 20px rgba(0,0,0,0.04);
  --shadow-lg: 0 0 0 1px rgba(0,0,0,0.04), 0 8px 16px rgba(0,0,0,0.08), 0 24px 40px rgba(0,0,0,0.06);
  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --speed-fast: 0.15s;
  --speed-normal: 0.25s;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  letter-spacing: 0.01em;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--primary); text-decoration: none; }
a:hover { color: var(--primary-hover); }

/* ===== Header ===== */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.92);
}
.header h1 { font-size: 17px; font-weight: 700; color: var(--primary); letter-spacing: -0.01em; }
.header h1 small { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-left: 10px; letter-spacing: 0.02em; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.btn-icon {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 7px 11px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-muted);
  transition: all var(--speed-fast) var(--ease-out);
}
.btn-icon:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

/* ===== Main Layout — Single Column ===== */
.container { max-width:1100px; margin:0 auto; padding:24px; }

/* ===== Cards ===== */
.card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:24px; box-shadow:var(--shadow-md); transition:box-shadow var(--speed-normal) var(--ease-out); }
.card:hover { box-shadow:var(--shadow-lg); }
.card h2 { font-size:14px; font-weight:600; color:var(--primary); margin-bottom:14px; padding-bottom:10px; border-bottom:2px solid var(--primary-light); letter-spacing:0.02em; text-transform:uppercase; }

/* ===== Input Area (centered, constrained width) ===== */
.input-area { max-width:720px; margin:0 auto; }
.input-area textarea {
  width:100%; height:200px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; font-size:14px; font-family:inherit; line-height:1.7; resize:vertical;
  transition:all var(--speed-fast) var(--ease-out); background:var(--bg);
}
.input-area textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-ring); background:var(--card); }
.input-area textarea::placeholder { color:var(--text-placeholder); }
.input-controls { display:flex; gap:10px; margin-top:14px; align-items:center; }
.btn-primary {
  background:var(--primary); color:#fff; border:none; border-radius:var(--radius-sm); padding:11px 28px; font-size:14px; font-weight:600; cursor:pointer;
  transition:all var(--speed-fast) var(--ease-out); letter-spacing:0.02em;
}
.btn-primary:hover { background:var(--primary-hover); transform:translateY(-1px); box-shadow:var(--shadow-md); }
.btn-primary:active { transform:translateY(0); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.model-select { border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 14px; font-size:13px; background:var(--card); color:var(--text-secondary); transition:border-color var(--speed-fast); }
.model-select:focus { outline:none; border-color:var(--primary); }

/* ===== Loading ===== */
.loading { display:none; text-align:center; padding:32px 20px; }
.loading.active { display:block; }
.loading-visual { position:relative; width:120px; height:120px; margin:0 auto 20px; }
.loading-ring { width:120px; height:120px; border:3px solid var(--border-light); border-top-color:var(--primary); border-right-color:var(--accent); border-radius:50%; animation:spin 1.2s linear infinite; }
.loading-ring-inner { position:absolute; top:15px; left:15px; width:90px; height:90px; border:2px solid var(--border-light); border-bottom-color:var(--primary); border-left-color:var(--gold); border-radius:50%; animation:spin-reverse 1.8s linear infinite; }
.loading-icon { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:28px; animation:pulse 2s ease-in-out infinite; color:var(--primary); }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes spin-reverse { to { transform:rotate(-360deg); } }
@keyframes pulse { 0%,100% { opacity:.4; transform:translate(-50%,-50%) scale(.9); } 50% { opacity:1; transform:translate(-50%,-50%) scale(1.1); } }
.loading-steps { list-style:none; text-align:left; display:inline-block; margin-top:8px; }
.loading-steps li { font-size:12px; color:var(--text-muted); padding:4px 0; transition:all .3s; display:flex; align-items:center; gap:8px; }
.loading-steps li.active { color:var(--primary); font-weight:600; }
.loading-steps li .check { display:inline-block; width:16px; height:16px; border-radius:50%; border:1.5px solid var(--border); text-align:center; line-height:14px; font-size:10px; flex-shrink:0; }
.loading-steps li.done .check { background:var(--success); border-color:var(--success); color:#fff; }
.loading-steps li.active .check { border-color:var(--primary); animation:pulse-dot 1s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100% { box-shadow:0 0 0 0 rgba(120,60,40,0.3); } 50% { box-shadow:0 0 0 6px rgba(120,60,40,0); } }

/* ===== Toast / Inline Error ===== */
.toast { position:fixed; top:80px; right:24px; z-index:300; padding:14px 20px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; box-shadow:var(--shadow-lg); transform:translateX(120%); transition:transform .4s var(--ease-out); max-width:400px; }
.toast.active { transform:translateX(0); }
.toast.error { background:var(--danger); color:#fff; }
.toast.info { background:var(--primary); color:#fff; }
.toast.warning { background:var(--warning); color:#fff; }

/* ===== Results Section (full width below input) ===== */
.results-section { display:none; margin-top:24px; }
.results-section.active { display:block; }

/* --- Tier 1: Hero --- */
.result-hero {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
  flex-wrap:wrap;
  padding:32px 20px;
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow-md);
}
.score-ring-wrap { flex-shrink:0; }
.score-ring-wrap svg { width:160px; height:160px; }
.hero-badges {
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:flex-start;
}
.hero-badge {
  display:inline-block;
  padding:6px 18px;
  border-radius:24px;
  font-size:13px;
  font-weight:600;
  letter-spacing:0.02em;
}
.timing-too_early { background:var(--bg-secondary); color:var(--text-muted); }
.timing-approaching { background:#fdf3e0; color:var(--warning); }
.timing-optimal { background:#e8f0e6; color:var(--success); }
.timing-passing { background:#fde8d8; color:#a05a3c; }
.timing-too_late { background:#f8e0de; color:var(--danger); }
.trigger-badge { background:var(--bg-secondary); color:var(--text-secondary); border:1px solid var(--border); }

/* --- Tier 2: Analysis Grid --- */
.analysis-grid {
  display:grid;
  grid-template-columns:350px 1fr;
  gap:24px;
  margin-top:24px;
  align-items:start;
}
@media (max-width:768px) { .analysis-grid { grid-template-columns:1fr; } }
.radar-panel {
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow-md);
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
}
.radar-panel svg { width:100%; max-width:350px; }
.axes-panel { display:flex; flex-direction:column; gap:10px; }

/* Axis cards with colored left border */
.axis-card {
  background:var(--card);
  border:1px solid var(--border);
  border-left:4px solid var(--border);
  border-radius:var(--radius-sm);
  padding:14px 16px;
  transition:all var(--speed-fast) var(--ease-out);
}
.axis-card:hover { box-shadow:var(--shadow-sm); }
.axis-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.axis-name-wrap { display:flex; flex-direction:column; gap:2px; }
.axis-name { font-weight:600; font-size:13px; color:var(--text); }
.axis-desc { font-size:11px; color:var(--text-muted); font-weight:400; }
.axis-score-num { font-size:15px; font-weight:700; min-width:28px; text-align:right; }
.score-bar { height:5px; background:var(--bg-secondary); border-radius:3px; margin-top:8px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:3px; transition:width .6s var(--ease-out); }
.axis-rationale {
  margin-top:10px;
  font-size:13px;
  line-height:1.7;
  color:var(--text-secondary);
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.axis-rationale.expanded {
  display:block;
  -webkit-line-clamp:unset;
  overflow:visible;
}
.axis-more-toggle {
  background:none;
  border:none;
  color:var(--primary);
  font-size:12px;
  cursor:pointer;
  padding:4px 0;
  font-weight:500;
}
.axis-more-toggle:hover { color:var(--primary-hover); text-decoration:underline; }
.signal-tag { display:inline-block; background:var(--primary-light); color:var(--primary); padding:3px 10px; border-radius:6px; font-size:11px; margin:3px 3px 0 0; font-weight:500; }

/* --- Tier 3: Details --- */
.assessment-box {
  background:var(--bg-secondary);
  border-radius:var(--radius);
  padding:20px 24px;
  margin-top:24px;
  font-size:14px;
  line-height:1.8;
  color:var(--text-secondary);
  border-left:4px solid var(--primary);
  position:relative;
}
.assessment-box::before {
  content:'\201C';
  position:absolute;
  top:8px;
  left:10px;
  font-size:32px;
  color:var(--border-dark);
  font-family:Georgia, serif;
  line-height:1;
}
.assessment-box .assessment-content { padding-left:16px; }
.details-grid {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:14px;
  margin-top:16px;
}
@media (max-width:640px) { .details-grid { grid-template-columns:1fr; } }
.detail-card {
  background:var(--card);
  border-radius:var(--radius-sm);
  padding:16px;
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}
.detail-card-label { font-size:10px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
.detail-card-value { font-size:16px; font-weight:700; margin-top:6px; color:var(--text); }
.detail-card-desc { font-size:12px; color:var(--text-muted); margin-top:6px; line-height:1.6; }

/* ===== History ===== */
.history-section { margin-top:24px; }
.history-item { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; cursor:pointer; transition:all var(--speed-fast) var(--ease-out); background:var(--card); }
.history-item:hover { border-color:var(--accent); box-shadow:var(--shadow-sm); }
.history-theme { font-size:13px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:12px; color:var(--text-secondary); }
.history-score { font-size:18px; font-weight:700; color:var(--primary); min-width:36px; text-align:center; }
.history-meta { font-size:11px; color:var(--text-muted); margin-left:12px; white-space:nowrap; }
.history-actions { display:flex; gap:8px; margin-bottom:12px; justify-content:flex-end; }
.btn-sm { padding:5px 14px; font-size:12px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--card); cursor:pointer; color:var(--text-muted); transition:all var(--speed-fast) var(--ease-out); font-weight:500; }
.btn-sm:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-light); }
.btn-sm.danger:hover { border-color:var(--danger); color:var(--danger); background:#f8e0de; }
.empty-state { text-align:center; padding:40px; color:var(--text-muted); font-size:13px; }

/* ===== Modal ===== */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:200; justify-content:center; align-items:center; backdrop-filter:blur(4px); }
.modal-overlay.active { display:flex; }
.modal { background:var(--card); border-radius:var(--radius); padding:28px; max-width:420px; width:90%; box-shadow:var(--shadow-lg); }
.modal h3 { font-size:16px; color:var(--primary); margin-bottom:16px; font-weight:600; }
.modal input { width:100%; border:1px solid var(--border); border-radius:var(--radius-sm); padding:11px 14px; font-size:14px; margin-bottom:12px; background:var(--bg); transition:all var(--speed-fast); }
.modal input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-ring); background:var(--card); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; }
.api-status { font-size:12px; margin-bottom:8px; }
.api-status.ok { color:var(--success); font-weight:500; }
.api-status.ng { color:var(--danger); font-weight:500; }

/* ===== Examples ===== */
.examples { margin-top:12px; }
.examples summary { font-size:12px; color:var(--text-muted); cursor:pointer; }
.example-btn { display:block; width:100%; text-align:left; padding:9px 12px; margin-top:5px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--card); font-size:12px; cursor:pointer; transition:all var(--speed-fast) var(--ease-out); color:var(--text-secondary); }
.example-btn:hover { border-color:var(--accent); background:var(--primary-light); color:var(--primary); }

/* ===== Loading section (centered below input) ===== */
.loading-section { max-width:720px; margin:24px auto 0; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>Structural Inflection Point Scorer<small>構造的変化点スコアラー</small></h1>
  <div class="header-actions">
    <a href="guide.html" style="font-size:13px; color:var(--text-muted); text-decoration:none; margin-right:4px;">使い方ガイド</a>
    <button class="btn-icon" onclick="openSettings()" title="API設定">&#9881;</button>
  </div>
</div>

<!-- Toast (direct child of body for correct fixed positioning) -->
<div id="toast" class="toast"></div>

<!-- Main -->
<div class="container">

  <!-- Input Section -->
  <div class="card input-area">
    <h2>研究テーマ / 事業領域を入力</h2>
    <textarea id="themeInput" placeholder="評価したい研究テーマや事業領域の説明を入力してください。&#10;&#10;例：超伝導量子コンピュータ向け超低消費電力KTWPA読み出しモジュール。Google Willowが2024年に105量子ビットでエラー訂正閾値を突破し、数千〜数万量子ビットへのスケールアップが「今やらなければいけない課題」に転換。従来のHEMT増幅器では発熱が大きすぎて量子ビット数の増加に耐えられない物理的制約が顕在化。"></textarea>
    <div class="input-controls">
      <button class="btn-primary" id="evalBtn">変化点を評価</button>
      <select class="model-select" id="modelSelect">
        <option value="claude-sonnet-4-6">Sonnet 4.6 (推奨)</option>
        <option value="claude-opus-4-6">Opus 4.6</option>
      </select>
    </div>
    <details class="examples">
      <summary>入力例を使う</summary>
      <button class="example-btn" onclick="useExample(0)">量子コンピュータ向けKTWPA読み出しモジュール（物理的限界到達型）</button>
      <button class="example-btn" onclick="useExample(1)">深海電気合成微生物によるCO2直接変換（需要構造転換型）</button>
      <button class="example-btn" onclick="useExample(2)">微生物バイオリファイニングによるレアメタル回収（地政学+規制複合型）</button>
    </details>
  </div>

  <!-- Placeholder -->
  <div id="placeholder" class="empty-state" style="margin-top:24px;">
    研究テーマを入力して「変化点を評価」を押してください
  </div>

  <!-- Loading -->
  <div class="loading-section">
    <div id="loading" class="loading">
      <div class="loading-visual">
        <div class="loading-ring"></div>
        <div class="loading-ring-inner"></div>
        <div class="loading-icon">&#9883;</div>
      </div>
      <div style="color:var(--text); font-size:14px; font-weight:600; margin-bottom:12px;">構造的変化点を分析中</div>
      <ul class="loading-steps" id="loadingSteps">
        <li class="active" id="step1"><span class="check"></span>閾値への接近度を分析中</li>
        <li id="step2"><span class="check"></span>外圧と機会の窓を分析中</li>
        <li id="step3"><span class="check"></span>技術革命サイクルを分析中</li>
        <li id="step4"><span class="check"></span>制度的障壁の変化を分析中</li>
        <li id="step5"><span class="check"></span>不確実性の解消度を分析中</li>
      </ul>
    </div>
  </div>

  <!-- Results Section (hidden until evaluation) -->
  <div id="resultsSection" class="results-section">
    <!-- Tier 1: Hero -->
    <div class="result-hero">
      <div class="score-ring-wrap" id="scoreRing"></div>
      <div class="hero-badges" id="heroBadges"></div>
    </div>

    <!-- Tier 2: Analysis Grid -->
    <div class="analysis-grid">
      <div class="radar-panel" id="radarWrap"></div>
      <div class="axes-panel" id="axisCards"></div>
    </div>

    <!-- Tier 3: Details -->
    <div id="assessmentBox"></div>
    <div class="details-grid" id="infoGrid"></div>
    <div style="text-align:right; margin-top:12px;">
      <button class="btn-sm" onclick="copyAsMarkdown()">Markdownでコピー</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-section card" style="margin-top:24px;">
    <h2>評価履歴</h2>
    <div class="history-actions">
      <button class="btn-sm danger" onclick="clearHistory()">履歴をクリア</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>API設定</h3>
    <div class="api-status" id="apiStatus"></div>
    <input type="password" id="apiKeyInput" placeholder="Anthropic API Key (sk-ant-...)" />
    <div class="modal-actions">
      <button class="btn-sm danger" onclick="clearApiKey()">クリア</button>
      <button class="btn-sm" onclick="closeSettings()">キャンセル</button>
      <button class="btn-primary" style="font-size:13px; padding:6px 16px;" onclick="saveApiKey()">保存</button>
    </div>
  </div>
</div>

<script>
// ===== Constants =====
const STORAGE_KEY = 'sip_scorer_history';
const API_KEY_KEY = 'anthropic_api_key';
const MAX_HISTORY = 50;

const AXIS_META = {
  scheffer:      { name: '閾値への接近',     fullName: '閾値への接近度（Scheffer臨界遷移論）',              color: '#783c28', desc: '遅い変数が臨界点にどれだけ近づいているか' },
  geels:         { name: '外圧と機会の窓',   fullName: '外圧と機会の窓（Geels多層的視座）',                color: '#A86B50', desc: 'ランドスケープ圧力がレジームを不安定化させているか' },
  perez:         { name: '技術革命サイクル',  fullName: '技術革命サイクル上の位置（Perez技術革命論）',       color: '#5a7a52', desc: '導入期→展開期の転換点にどれだけ近いか' },
  north:         { name: '制度的障壁の変化',  fullName: '制度的障壁の変化（North制度経済学）',              color: '#2c5f8a', desc: '規制・標準化による取引費用の低下が起きているか' },

// ===== System Prompt =====
const SYSTEM_PROMPT = `あなたは「構造的変化点（Structural Inflection Point）」理論に基づく研究テーマ・事業領域の評価専門家です。

## 構造的変化点とは
技術の商業化において、複数の遅い変数（技術コスト、規制環境、インフラ整備度、補完財の成熟度、社会的受容度）の緩慢な変化が蓄積した結果、支配的な社会技術的レジームの引力盆が消滅し、系が新たな安定状態へ不連続に遷移する転換点。

## 評価軸（5つの理論的フレームワーク）

### 軸1: Scheffer臨界遷移論
複雑系が「折り畳み分岐（fold bifurcation）」を通じて不連続にレジームシフトする理論。
- 高得点(7-10): 遅い変数（コスト低下、規制変化、インフラ整備）が明確に閾値に接近。臨界減速のシグナル（市場の応答鈍化、プレイヤー間の二極化）が観察可能。
- 中得点(4-6): 遅い変数が変化しているが、閾値までの距離が不確実。シグナルは曖昧。
- 低得点(1-3): 遅い変数の変化が緩慢で、臨界点は遠い。既存レジームが安定。

### 軸2: Geels多層的視座(MLP)
ランドスケープ圧力→レジーム不安定化→ニッチの「機会の窓」という3層相互作用モデル。
- 高得点(7-10): ランドスケープ圧力（地政学、規制、パンデミック等）がレジームを明確に不安定化。機会の窓が開いている、または開きつつある。
- 中得点(4-6): ランドスケープ圧力は存在するが、レジームの抵抗力がまだ強い。窓は半開き。
- 低得点(1-3): ランドスケープ圧力が弱い、またはレジームが安定。窓は閉じている。

### 軸3: Perez技術革命波動論
技術革命の「導入期→転換点→展開期」サイクル。転換点は制度・規制・社会的変化によって決定される。
- 高得点(7-10): 関連する技術パラダイムが導入期を終え、制度的転換点に位置。投機的バブル後の「展開期」入りの兆候。
- 中得点(4-6): 導入期の中盤。投機的関心はあるが制度的転換は未到来。
- 低得点(1-3): まだ導入期の初期。基礎研究フェーズ。

### 軸4: North制度経済学
制度変化（規制・法律・標準化）による取引費用の急落が市場を創出するメカニズム。
- 高得点(7-10): 具体的な規制変化・標準確定・認証制度の開始が確認できる。取引費用が急落中。
- 中得点(4-6): 規制議論が進行中だが未確定。パブリックコメント段階等。
- 低得点(1-3): 規制的変化の兆候が乏しい。既存の制度的障壁が高い。

### 軸5: Dixit-Pindyckリアルオプション
不確実性の急落→待機オプション価値の消滅→投資の最適タイミング。
- 高得点(7-10): 規制確定、標準化、大口需要家のコミットメント等により不確実性が急減。今投資すべき局面。
- 中得点(4-6): 一部の不確実性は解消されたが、重要な不確実性が残存。
- 低得点(1-3): 不確実性が高く、待機が合理的。

## トリガー分類（5類型）
- regulatory: 規制確定型（規制・標準の確定が需要を創出）
- geopolitical: 地政学的再編型（サプライチェーン再編が市場を創出）
- physical_limits: 物理的限界到達型（既存技術の物理的限界が代替技術を必須に）
- demand_shift: 需要構造転換型（需要の質的変化が不可逆的に発生）
- compound: 複合型（上記複数の同時発生・相互増幅）

## 投資タイミング判定
- too_early: 変化点まで3年以上。基礎研究段階。
- approaching: 変化点まで1-3年。準備段階。
- optimal: 変化点の直前〜直後。最適な参入タイミング。
- passing: 変化点を通過中。早期フォロワーの機会。
- too_late: 変化点通過済み。先行者優位が確立。

## 回答形式
必ず以下のJSON形式のみで回答してください。JSON以外のテキスト、マークダウンのコードフェンス、説明文は一切含めないでください。

{"axes":{"scheffer":{"score":0,"rationale":"","signals":[]},"geels":{"score":0,"rationale":"","signals":[]},"perez":{"score":0,"rationale":"","signals":[]},"north":{"score":0,"rationale":"","signals":[]},"dixit_pindyck":{"score":0,"rationale":"","signals":[]}},"composite_score":0,"trigger_type":"","trigger_detail":"","early_warnings":[],"irreversibility":{"score":0,"rationale":""},"overall_assessment":"","investment_timing":"","confidence":0}

scoreは1-10の整数、confidenceは0.0-1.0の小数です。composite_scoreは5軸の加重平均（Scheffer:0.25, Geels:0.20, Perez:0.15, North:0.20, Dixit-Pindyck:0.20）で算出してください。`;

// ===== Normalize Result =====
function normalizeResult(r) {
  if (!r) r = {};
  if (!r.axes) r.axes = {};
  // Remove non-axis keys that AI may have mixed into axes
  const validAxes = ['scheffer','geels','perez','north','dixit_pindyck'];
  for (const k of Object.keys(r.axes)) {
    if (!validAxes.includes(k)) {
      // Move to top level if useful
      if (k === 'irreversibility' && !r.irreversibility) r.irreversibility = r.axes[k];
      delete r.axes[k];
    }
  }
  // Ensure all axes exist
  for (const k of validAxes) {
    if (!r.axes[k]) r.axes[k] = { score: 0, rationale: '', signals: [] };
    const ax = r.axes[k];
    if (typeof ax.score !== 'number') ax.score = parseInt(ax.score) || 0;
    ax.score = Math.max(1, Math.min(10, ax.score));
    if (!ax.rationale) ax.rationale = '';
    if (!Array.isArray(ax.signals)) ax.signals = [];
  }
  // Calculate composite_score if missing (weighted average)
  if (!r.composite_score || typeof r.composite_score !== 'number') {
    const w = { scheffer: 0.25, geels: 0.20, perez: 0.15, north: 0.20, dixit_pindyck: 0.20 };
    r.composite_score = 0;
    for (const [k, wt] of Object.entries(w)) {
      r.composite_score += (r.axes[k]?.score || 0) * wt;
    }
    r.composite_score = Math.round(r.composite_score * 10) / 10;
  }
  // Derive investment_timing from composite_score if missing
  if (!r.investment_timing) {
    const s = r.composite_score;
    if (s >= 8) r.investment_timing = 'optimal';
    else if (s >= 6) r.investment_timing = 'approaching';
    else if (s >= 4) r.investment_timing = 'passing';
    else if (s >= 2) r.investment_timing = 'too_early';
    else r.investment_timing = 'too_early';
  }
  // Defaults for other fields
  if (!r.trigger_type) r.trigger_type = '';
  if (!r.trigger_detail) r.trigger_detail = '';
  if (!Array.isArray(r.early_warnings)) r.early_warnings = [];
  if (!r.irreversibility) r.irreversibility = { score: 0, rationale: '' };
  if (typeof r.irreversibility.score !== 'number') r.irreversibility.score = parseInt(r.irreversibility.score) || 0;
  if (!r.overall_assessment) r.overall_assessment = '';
  if (typeof r.confidence !== 'number') r.confidence = 0;
  return r;
}

// ===== Loading Steps Animation =====
let _stepInterval = null;
function startLoadingSteps() {
  const steps = document.querySelectorAll('#loadingSteps li');
  steps.forEach(s => { s.className = ''; });
  if (steps[0]) steps[0].className = 'active';
  let idx = 0;
  _stepInterval = setInterval(() => {
    if (steps[idx]) { steps[idx].className = 'done'; steps[idx].querySelector('.check').textContent = '\u2713'; }
    idx++;
    if (idx < steps.length) { steps[idx].className = 'active'; }
    else { clearInterval(_stepInterval); _stepInterval = null; }
  }, 4000);
}
function stopLoadingSteps() {
  if (_stepInterval) { clearInterval(_stepInterval); _stepInterval = null; }
  document.querySelectorAll('#loadingSteps li').forEach(s => {
    s.className = 'done';
    s.querySelector('.check').textContent = '\u2713';
  });
}

// ===== Evaluate =====
async function evaluate() {
  // Check file:// protocol
  if (location.protocol === 'file:') {
    showToast('file://では動作しません。GitHub Pages版を使ってください', 'warning', 8000);
    return;
  }
  const theme = document.getElementById('themeInput').value.trim();
  if (!theme) { showToast('研究テーマを入力してください', 'info'); return; }
  const apiKey = getApiKey();
  if (!apiKey) { openSettings(); showToast('APIキーを設定してください（歯車アイコン）', 'warning', 8000); return; }

  const model = document.getElementById('modelSelect').value;
  const btn = document.getElementById('evalBtn');

  // UI state
  btn.disabled = true;
  btn.textContent = '分析中...';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('resultsSection').classList.remove('active');
  document.getElementById('loading').classList.add('active');
  startLoadingSteps();

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 8192,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: `以下の研究テーマ/事業領域を評価してください：\n\n${theme}` }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error: ${resp.status}`);
    }

    const data = await resp.json();
    let text = data.content[0].text;

    // Strip markdown code fences if present
    text = text.replace(/^```json\s*/gi, '').replace(/\s*```\s*$/gi, '').trim();

    // Extract JSON block robustly
    let jsonStr = text;
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (jsonMatch) jsonStr = jsonMatch[0];

    // Attempt to fix common JSON issues: trailing commas, unescaped newlines in strings
    jsonStr = jsonStr.replace(/,\s*([\]}])/g, '$1');

    let result;
    try {
      result = JSON.parse(jsonStr);
    } catch (parseErr) {
      // Retry: ask the model to fix its own JSON
      console.warn('JSON parse failed, retrying with repair prompt...', parseErr.message);
      const repairResp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: model,
          max_tokens: 8192,
          messages: [{
            role: 'user',
            content: `以下のJSONにはシンタックスエラーがあります。修正して有効なJSONのみを出力してください。余計なテキストは不要です。\n\n${text}`
          }]
        })
      });
      if (!repairResp.ok) throw new Error('JSON修正リクエストが失敗しました');
      const repairData = await repairResp.json();
      let repairText = repairData.content[0].text;
      repairText = repairText.replace(/^```json\s*/gi, '').replace(/\s*```\s*$/gi, '').trim();
      const repairMatch = repairText.match(/\{[\s\S]*\}/);
      if (!repairMatch) throw new Error('AIの応答からJSONを抽出できませんでした');
      result = JSON.parse(repairMatch[0]);
    }
    // Normalize: ensure all expected fields exist with fallback calculations
    result = normalizeResult(result);
    currentResult = result;

    // Save to history
    saveToHistory(theme, result, model);

    // Render
    renderResults(result);

  } catch (err) {
    showToast(err.message, 'error', 8000);
    document.getElementById('placeholder').style.display = 'block';
  } finally {
    stopLoadingSteps();
    btn.disabled = false;
    btn.textContent = '変化点を評価';
    document.getElementById('loading').classList.remove('active');
  }
}

// ===== Score Ring SVG =====
function renderScoreRing(score) {
  const pct = (score / 10) * 100;
  // Circumference of circle r=70: 2 * PI * 70 = ~439.8
  const circumference = 2 * Math.PI * 70;
  const dashLen = (pct * circumference) / 100;
  const color = score >= 7 ? 'var(--success)' : score >= 4 ? 'var(--warning)' : 'var(--danger)';
  const colorHex = score >= 7 ? '#5a7a52' : score >= 4 ? '#b8863e' : '#b44a3f';

  return `<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
    <circle cx="80" cy="80" r="70" fill="none" stroke="#f3efe9" stroke-width="8"/>
    <circle cx="80" cy="80" r="70" fill="none" stroke="${colorHex}" stroke-width="8"
      stroke-dasharray="${dashLen} ${circumference}" stroke-linecap="round"
      transform="rotate(-90 80 80)" style="transition: stroke-dasharray 1s ease-out"/>
    <text x="80" y="72" text-anchor="middle" font-size="40" font-weight="800" fill="${colorHex}">${score.toFixed(1)}</text>
    <text x="80" y="96" text-anchor="middle" font-size="11" fill="#8a7668">/ 10</text>
  </svg>`;
}

// ===== Render Results =====
function renderResults(r) {
  const section = document.getElementById('resultsSection');
  section.classList.add('active');

  // Tier 1: Hero — Score ring
  const score = r.composite_score || 0;
  document.getElementById('scoreRing').innerHTML = renderScoreRing(score);

  // Tier 1: Hero — Badges (timing + trigger)
  const timing = r.investment_timing || 'approaching';
  const trigger = r.trigger_type || '';
  let badgesHtml = `<span class="hero-badge timing-${timing}">${TIMING_LABELS[timing] || timing}</span>`;
  if (trigger) {
    badgesHtml += `<span class="hero-badge trigger-badge">${esc(TRIGGER_LABELS[trigger] || trigger)}</span>`;
  }
  document.getElementById('heroBadges').innerHTML = badgesHtml;

  // Tier 2: Radar chart (larger)
  const scores = {};
  for (const k of Object.keys(AXIS_META)) {
    scores[k] = r.axes?.[k]?.score || 0;
  }
  document.getElementById('radarWrap').innerHTML = renderRadarSVG(scores);

  // Tier 2: Axis cards with colored left borders
  let axisHtml = '';
  for (const [key, meta] of Object.entries(AXIS_META)) {
    const ax = r.axes?.[key] || {};
    const s = ax.score || 0;
    const pct = s * 10;
    const rationale = esc(ax.rationale || '');
    const signals = (ax.signals || []).map(sig => `<span class="signal-tag">${esc(sig)}</span>`).join('');
    const cardId = 'axis-' + key;

    axisHtml += `
      <div class="axis-card" style="border-left-color:${meta.color}">
        <div class="axis-header">
          <div class="axis-name-wrap">
            <span class="axis-name">${meta.fullName}</span>
            <span class="axis-desc">${meta.desc}</span>
          </div>
          <span class="axis-score-num" style="color:${meta.color}">${s}</span>
        </div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${meta.color}"></div></div>
        ${rationale ? `<div class="axis-rationale" id="${cardId}-rationale">${rationale}</div>
        <button class="axis-more-toggle" id="${cardId}-toggle" onclick="toggleAxisText('${cardId}')">more</button>` : ''}
        ${signals ? '<div style="margin-top:6px">' + signals + '</div>' : ''}
      </div>`;
  }
  document.getElementById('axisCards').innerHTML = axisHtml;

  // After rendering, hide "more" button if text is not truncated
  requestAnimationFrame(() => {
    for (const key of Object.keys(AXIS_META)) {
      const cardId = 'axis-' + key;
      const el = document.getElementById(cardId + '-rationale');
      const btn = document.getElementById(cardId + '-toggle');
      if (el && btn) {
        // Check if text is actually clamped
        if (el.scrollHeight <= el.clientHeight + 2) {
          btn.style.display = 'none';
        }
      }
    }
  });

  // Tier 3: Assessment
  if (r.overall_assessment) {
    document.getElementById('assessmentBox').innerHTML = `
      <div class="assessment-box">
        <div class="assessment-content"><strong>総合評価:</strong> ${esc(r.overall_assessment)}</div>
      </div>`;
  } else {
    document.getElementById('assessmentBox').innerHTML = '';
  }

  // Tier 3: Details grid (3 cards)
  const irr = r.irreversibility || {};
  const conf = r.confidence || 0;
  const earlyWarnings = (r.early_warnings || []).map(w => `<span class="signal-tag">${esc(w)}</span>`).join('');

  document.getElementById('infoGrid').innerHTML = `
    <div class="detail-card">
      <div class="detail-card-label">早期警戒シグナル</div>
      <div style="margin-top:8px">${earlyWarnings || '<span style="color:var(--text-muted);font-size:13px">--</span>'}</div>
    </div>
    <div class="detail-card">
      <div class="detail-card-label">不可逆性</div>
      <div class="detail-card-value">${irr.score || 0} / 10</div>
      <div class="detail-card-desc">${esc(irr.rationale || '')}</div>
    </div>
    <div class="detail-card">
      <div class="detail-card-label">AI確信度</div>
      <div class="detail-card-value">${(conf * 100).toFixed(0)}%</div>
      ${r.trigger_detail ? `<div class="detail-card-desc">${esc(r.trigger_detail)}</div>` : ''}
    </div>`;
}

// ===== Toggle axis rationale text =====
function toggleAxisText(cardId) {
  const el = document.getElementById(cardId + '-rationale');
  const btn = document.getElementById(cardId + '-toggle');
  if (!el || !btn) return;
  const isExpanded = el.classList.contains('expanded');
  if (isExpanded) {
    el.classList.remove('expanded');
    btn.textContent = 'more';
  } else {
    el.classList.add('expanded');
    btn.textContent = 'less';
  }
}

// ===== Radar SVG (larger, 350px) =====
function renderRadarSVG(scores) {
  const cx = 175, cy = 175, R = 140;
  const keys = Object.keys(AXIS_META);
  const n = keys.length;

  function pt(i, r) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
  }

  // Grid lines
  let grid = '';
  for (const frac of [0.33, 0.66, 1.0]) {
    const pts = keys.map((_, i) => pt(i, R * frac).join(',')).join(' ');
    grid += `<polygon points="${pts}" fill="none" stroke="#e6d5c4" stroke-width="0.8"/>`;
  }

  // Axis lines + labels
  let axes = '';
  keys.forEach((k, i) => {
    const [x, y] = pt(i, R);
    axes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e6d5c4" stroke-width="0.8"/>`;
    const [lx, ly] = pt(i, R + 26);
    const meta = AXIS_META[k];
    axes += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="${meta.color}" font-weight="600">${meta.name}</text>`;
  });

  // Score polygon
  const scorePts = keys.map((k, i) => {
    const s = Math.max(1, Math.min(10, scores[k] || 0));
    return pt(i, R * s / 10).join(',');
  }).join(' ');

  // Score dots
  let dots = '';
  keys.forEach((k, i) => {
    const s = Math.max(1, Math.min(10, scores[k] || 0));
    const [x, y] = pt(i, R * s / 10);
    dots += `<circle cx="${x}" cy="${y}" r="4" fill="${AXIS_META[k].color}" stroke="#fff" stroke-width="1.5"/>`;
  });

  return `<svg viewBox="0 0 350 350" xmlns="http://www.w3.org/2000/svg">
    ${grid}${axes}
    <polygon points="${scorePts}" fill="rgba(120,60,40,0.12)" stroke="#783c28" stroke-width="2" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

// ===== History =====
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveToHistory(theme, result, model) {
  const history = loadHistory();
  history.unshift({
    id: Date.now().toString(36),
    timestamp: new Date().toISOString(),
    theme: theme,
    result: result,
    model: model
  });
  if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  renderHistory();
}
function clearHistory() {
  if (!confirm('評価履歴をすべて削除しますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderHistory();
}
function renderHistory() {
  const history = loadHistory();
  const el = document.getElementById('historyList');
  if (!history.length) {
    el.innerHTML = '<div class="empty-state">評価履歴はまだありません</div>';
    return;
  }
  el.innerHTML = history.map(h => {
    const score = h.result?.composite_score || 0;
    const date = new Date(h.timestamp).toLocaleDateString('ja-JP');
    const color = score >= 7 ? 'var(--success)' : score >= 4 ? 'var(--warning)' : 'var(--text-muted)';
    return `<div class="history-item" onclick="showHistoryItem('${h.id}')">
      <div class="history-theme">${esc(h.theme)}</div>
      <span class="history-score" style="color:${color}">${score.toFixed(1)}</span>
      <span class="history-meta">${date}</span>
    </div>`;
  }).join('');
}
function showHistoryItem(id) {
  const history = loadHistory();
  const item = history.find(h => h.id === id);
  if (!item) return;
  document.getElementById('themeInput').value = item.theme;
  currentResult = item.result;
  document.getElementById('placeholder').style.display = 'none';
  renderResults(item.result);
  // Scroll to results
  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== Copy as Markdown =====
function copyAsMarkdown() {
  if (!currentResult) return;
  const r = currentResult;
  const theme = document.getElementById('themeInput').value;
  let md = `# 構造的変化点評価\n\n`;
  md += `**テーマ**: ${theme}\n`;
  md += `**総合スコア**: ${r.composite_score}/10\n`;
  md += `**投資タイミング**: ${TIMING_LABELS[r.investment_timing] || r.investment_timing}\n`;
  md += `**トリガー類型**: ${TRIGGER_LABELS[r.trigger_type] || r.trigger_type}\n\n`;
  md += `## 5軸評価\n\n`;
  for (const [key, meta] of Object.entries(AXIS_META)) {
    const ax = r.axes?.[key] || {};
    md += `### ${meta.fullName}: ${ax.score}/10\n${ax.rationale}\n\n`;
  }
  md += `## 総合評価\n${r.overall_assessment}\n`;
  navigator.clipboard.writeText(md).then(() => {
    const btn = document.querySelector('[onclick="copyAsMarkdown()"]');
    btn.textContent = 'コピーしました';
    setTimeout(() => btn.textContent = 'Markdownでコピー', 2000);
  });
}

// ===== Utility =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
